## Proactive Push Accelerator — Cloudflare Worker config
##
## 作用：给主动消息 1.0 提供"到点喊醒浏览器"能力。cron 每分钟扫一次
## D1，对活着的订阅发 web-push。Worker 全程不接触聊天内容，所有 AI
## 生成都在浏览器本地完成。

name = "proactive-push"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

## 部署前需要把下面 database_id 换成你 `wrangler d1 create proactive-db`
## 输出的真实 id。
[[d1_databases]]
binding = "DB"
database_name = "proactive-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

## 每分钟扫一次即可；30 分钟间隔的主动消息粒度完全够用。
[triggers]
crons = ["* * * * *"]

## 非 secret 的环境变量放这里；VAPID 私钥用 `wrangler secret put` 设置。
[vars]
VAPID_SUBJECT = "mailto:replace-with-your-email@example.com"
## 客户端调用前加这个共享 token（写进 app 设置里）。留空则不校验，
## 不推荐线上裸跑——别人可以拿你的 cron 发垃圾 push 给其他订阅者。
CLIENT_TOKEN = ""
## 活心跳窗口（毫秒）。超过这个时长没收到 heartbeat 就不再给该订阅发
## wake push，避免"没 tab 还乱弹通知"。默认 5 分钟。
HEARTBEAT_WINDOW_MS = "300000"
